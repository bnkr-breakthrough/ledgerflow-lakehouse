version: "3.8"

services:

  # ─── PostgreSQL (Source Database) ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: ledgerflow_postgres
    environment:
      POSTGRES_DB: ledgerflowdb
      POSTGRES_USER: ledgerflow
      POSTGRES_PASSWORD: ledgerflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/01_create_schema.sql:/docker-entrypoint-initdb.d/01_create_schema.sql
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=5
      -c max_wal_senders=5
    networks:
      - ledgerflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerflow -d ledgerflowdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Zookeeper (required by Kafka) ────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ledgerflow_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ledgerflow_net

  # ─── Kafka (Message Broker) ───────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ledgerflow_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - ledgerflow_net

  # ─── Kafka Connect + Debezium ─────────────────────────────────────────────
  kafka-connect:
    image: debezium/connect:2.4
    container_name: ledgerflow_debezium
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: ledgerflow-connect-group
      CONFIG_STORAGE_TOPIC: ledgerflow_connect_configs
      OFFSET_STORAGE_TOPIC: ledgerflow_connect_offsets
      STATUS_STORAGE_TOPIC: ledgerflow_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    networks:
      - ledgerflow_net

  # ─── Kafdrop (Kafka UI) ───────────────────────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: ledgerflow_kafdrop
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
    networks:
      - ledgerflow_net

volumes:
  postgres_data:

networks:
  ledgerflow_net:
    driver: bridge
